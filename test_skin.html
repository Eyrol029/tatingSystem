<!DOCTYPE html>
<html>
<head><title>Test Skin API</title></head>
<body>
<h1>Test Skin API</h1>
<button onclick="testSkin()">Test POST /api/familyplanning/skin</button>
<button onclick="testConjunctiva()">Test POST /api/familyplanning/conjunctiva</button>
<pre id="result"></pre>

<script>
async function testSkin() {
    try {
        const response = await fetch('http://localhost:8080/api/familyplanning/skin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pExamID: 1, condition: 'normal' })
        });
        const text = await response.text();
        document.getElementById('result').textContent = `Status: ${response.status}\n${text}`;
    } catch (error) {
        document.getElementById('result').textContent = `Error: ${error.message}`;
    }
}

async function testConjunctiva() {
    try {
        const response = await fetch('http://localhost:8080/api/familyplanning/conjunctiva', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pExamID: 1, condition: 'normal' })
        });
        const text = await response.text();
        document.getElementById('result').textContent = `Status: ${response.status}\n${text}`;
    } catch (error) {
        document.getElementById('result').textContent = `Error: ${error.message}`;
    }
}
</script>
</body>
</html>
